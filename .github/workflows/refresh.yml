name: Refresh timetable

on:
  schedule:
    - cron: "5 * * * *"   # hourly, at :05
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

concurrency:
  group: refresh-timetable
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build timetable.json from Appmiral API
        env:
          X_PROTECT: ${{ secrets.APPMIRAL_X_PROTECT }}
        run: python build_timetable.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain timetable.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add timetable.json
            git commit -m "chore: refresh timetable ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi
