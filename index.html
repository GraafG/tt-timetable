<style>
  :root{
    --bg:#0b0c0e; --panel:#15171b; --panel2:#1c2026; --line:#2b313a;
    --fg:#eef2f6; --muted:#929aa4; --accent:#e10600; --accent2:#3aa0ff;
    --warn:#f5b301; --danger:#ff3b30; --mono:"SFMono-Regular",Consolas,monospace;
    --hourH:64px; --colW:190px; --axisW:56px;
    --checker:repeating-linear-gradient(90deg,#eef0f2 0 8px,#0b0b0b 8px 16px);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);min-height:100dvh;display:flex;flex-direction:column;
       font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-text-size-adjust:100%}
  a{color:var(--accent2)}
  header{padding:14px 22px;border-top:3px solid var(--accent);
         background:linear-gradient(180deg,#181b20,var(--panel));
         display:flex;gap:14px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
  .head-main{min-width:0;flex:1 1 360px}
  header h1{margin:0 0 4px;font-size:18px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:9px}
  header h1 .flag{font-size:18px}
  header p{margin:0;color:var(--muted);font-size:12.5px;max-width:82ch}
  .langsw{display:flex;gap:4px;flex:none;border:1px solid var(--line);border-radius:9px;padding:3px;background:#0e1216}
  .langsw button{background:transparent;border:0;color:var(--muted);font-size:12px;font-weight:700;
         padding:5px 9px;border-radius:6px;cursor:pointer;letter-spacing:.4px;min-width:34px}
  .langsw button:hover{color:var(--fg)}
  .langsw button.active{background:var(--accent);color:#fff}
  .checker{height:8px;background:var(--checker);background-size:16px 8px;
           box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.45)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;
           padding:11px 22px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{background:#21262d;border:1px solid var(--line);color:var(--fg);
       padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap}
  .tab .n{color:var(--muted);font-family:var(--mono);font-size:11px;margin-left:6px}
  .tab:hover{border-color:var(--accent2)}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;
         box-shadow:0 0 0 1px rgba(225,6,0,.35),0 2px 8px rgba(225,6,0,.25)}
  .tab.active .n{color:rgba(255,255,255,.85)}
  .tab.today{box-shadow:inset 0 0 0 2px var(--accent2)}
  .tab.active.today{box-shadow:inset 0 0 0 2px var(--accent2),0 2px 8px rgba(225,6,0,.25)}
  .spacer{flex:1}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:#21262d;border:0;color:var(--fg);padding:7px 13px;cursor:pointer;font-size:13px}
  .seg button.active{background:var(--accent2);color:#04121f;font-weight:600}
  .nowbtn{background:#21262d;border:1px solid var(--line);color:var(--fg);
       padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  .nowbtn:hover{border-color:var(--accent)}
  input[type=search]{background:#0a0d12;border:1px solid var(--line);color:var(--fg);
       padding:7px 11px;border-radius:8px;font-size:13px;min-width:180px}
  main{flex:1 1 auto;min-height:0;padding:18px 22px;overflow:auto}
  .msg{color:var(--muted);padding:48px;text-align:center}

  .gridwrap{overflow:auto;max-height:100%;border:1px solid var(--line);border-radius:10px;background:var(--panel);-webkit-overflow-scrolling:touch}
  .grid{position:relative;display:grid}
  .ghead{position:sticky;top:0;z-index:5;display:grid;background:var(--panel2);border-bottom:1px solid var(--line)}
  .ghead .corner{position:sticky;left:0;z-index:6;background:var(--panel2);border-right:1px solid var(--line)}
  .ghead .scol{padding:9px 10px;font-size:12.5px;font-weight:600;border-right:1px solid var(--line);
         display:flex;align-items:center;gap:8px;min-width:0}
  .ghead .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .ghead .scol span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gbody{position:relative;display:grid}
  .axis{position:sticky;left:0;z-index:4;background:var(--panel);border-right:1px solid var(--line)}
  .hour{height:var(--hourH);border-bottom:1px solid var(--line);position:relative}
  .hour .lbl{position:absolute;top:-8px;right:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .lane{position:relative;border-right:1px solid var(--line)}
  .lane .hline{position:absolute;left:0;right:0;height:0;border-top:1px solid #20272f}
  .nowline{position:absolute;left:0;right:0;height:6px;margin-top:-3px;z-index:3;pointer-events:none;
         background:var(--checker);background-size:12px 6px;box-shadow:0 0 8px rgba(225,6,0,.55)}
  .nowline::before{content:attr(data-label);position:absolute;left:2px;top:-15px;background:var(--accent);color:#fff;
         font-size:9px;font-weight:800;letter-spacing:.3px;padding:1px 5px;border-radius:4px;white-space:nowrap}
  .ev{position:absolute;left:4px;right:4px;border-radius:7px;padding:5px 7px;overflow:hidden;
      background:#1f2630;border:1px solid var(--line);border-left:4px solid var(--accent);cursor:pointer;
      box-shadow:0 1px 0 rgba(0,0,0,.3)}
  .ev:hover{filter:brightness(1.15)}
  .ev.live{box-shadow:0 0 0 1px var(--danger),0 1px 0 rgba(0,0,0,.3);animation:liveGlow 1.8s ease-in-out infinite}
  @keyframes liveGlow{0%,100%{box-shadow:0 0 0 1px var(--danger),0 1px 0 rgba(0,0,0,.3)}
         50%{box-shadow:0 0 0 1px var(--danger),0 0 12px rgba(255,59,48,.6)}}
  .ev .t{font-size:12.5px;font-weight:600;line-height:1.15;white-space:normal;word-break:break-word}
  .ev .tm{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px}
  .ev.short{padding:3px 7px}
  .ev.short .tm{display:none}
  .badge{display:inline-block;font-size:9.5px;color:#1a1300;background:var(--warn);
         border-radius:4px;padding:0 4px;margin-left:4px;font-weight:700;vertical-align:middle}

  .stage-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:16px;overflow:hidden}
  .stage-block h3{margin:0;padding:10px 14px;font-size:14px;background:var(--panel2);
         border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  .stage-block h3 .dot{width:11px;height:11px;border-radius:3px}
  .li{display:flex;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line);align-items:baseline;cursor:pointer}
  .li:last-child{border-bottom:0}
  .li:hover{background:#1a1f27}
  .li.live{background:#241316;border-left:3px solid var(--danger)}
  .li .when{font-family:var(--mono);font-size:12px;color:var(--accent2);min-width:108px;flex:none}
  .li .who{font-size:13.5px}
  .li .who .meta{color:var(--muted);font-size:12px;margin-top:1px}
  footer{color:var(--muted);font-size:11.5px;padding:14px 22px;border-top:1px solid var(--line);background:var(--panel)}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.open{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:12px;max-width:520px;width:100%;
        max-height:85vh;overflow:auto;padding:18px 20px}
  .card h2{margin:0 0 2px;font-size:18px}
  .card .sub{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .card .bio{font-size:13px;line-height:1.5;color:#cdd6df}
  .card img{max-width:100%;border-radius:8px;margin:6px 0 12px}
  .card .x{float:right;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}

  @media (prefers-reduced-motion: reduce){ .ev.live{animation:none} }

  @media (max-width:640px){
    header{padding:12px 14px}
    header h1{font-size:16px;letter-spacing:.4px}
    header p{font-size:12px;max-width:none}
    .checker{height:7px;background-size:14px 7px}
    .toolbar{padding:9px 12px;gap:8px}
    .tabs{order:-1;width:100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
          scrollbar-width:none;padding-bottom:2px}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:8px 12px}
    .spacer{display:none}
    main{padding:12px 12px}
    input[type=search]{flex:1 1 auto;min-width:0;font-size:16px;padding:9px 11px}
    .nowbtn{padding:9px 12px}
    .seg button{padding:9px 13px}
    :root{--colW:146px;--axisW:46px}
    .li{padding:11px 12px}
    .li .when{min-width:92px}
    .card{padding:16px 14px}
  }
  @media (max-width:380px){
    :root{--colW:130px}
    header p{display:none}
  }
</style>
</head>

  function imgUrl(ai){
    if(!ai) return "";
    if(typeof ai==="string") return ai;

    const ent=Object.keys(ai).map(k=>[parseInt(k,10),ai[k]]).filter(([w,v])=>v&&typeof v==="string"&&!isNaN(w)&&w>0);
    if(!ent.length) return "";
    ent.sort((a,b)=>a[0]-b[0]);
    return (ent.find(([w])=>w>=400)||ent[ent.length-1])[1];

  function t(k){ return (T && T[k]!=null) ? T[k] : (I18N.en[k]!=null ? I18N.en[k] : k); }

  function detectLang(){
    try{ const qs=new URLSearchParams(location.search).get("lang"); if(qs && SUPPORTED.includes(qs)) return qs; }catch(_){}
    try{ const s=localStorage.getItem("ttlang"); if(s && SUPPORTED.includes(s)) return s; }catch(_){}
    const cands = navigator.languages || [navigator.language || "en"];
    for(const l of cands){ const c=(l||"").slice(0,2).toLowerCase(); if(SUPPORTED.includes(c)) return c; }
    return "en";
  }
  function buildFormats(){
    const tz = TZ || TZ_DEFAULT;
    fmtTime   = new Intl.DateTimeFormat(LOCALE,{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:tz});
    fmtDayKey = new Intl.DateTimeFormat("en-CA",{year:"numeric",month:"2-digit",day:"2-digit",timeZone:tz});
    fmtDayLbl = new Intl.DateTimeFormat(LOCALE,{weekday:"short",day:"numeric",month:"short",timeZone:tz});
  }
  function isMobile(){ return !!(window.matchMedia && window.matchMedia("(max-width:640px)").matches); }
  function syncViewSeg(){ document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("active", b.dataset.view===view)); }

  function applyStaticI18n(){
    document.documentElement.lang = lang;
    const setText=(id,txt)=>{ const el=document.getElementById(id); if(el) el.textContent=txt; };
    setText("hTitle", t("h1"));
    const intro=document.getElementById("hIntro"); if(intro) intro.innerHTML=t("intro");
    setText("nowLbl", t("now"));
    const nb=document.getElementById("nowBtn"); if(nb) nb.title=t("now");
    const q=document.getElementById("q"); if(q) q.placeholder=t("searchPh");
    const seg=document.getElementById("viewSeg");
    if(seg){ const g=seg.querySelector('[data-view="grid"]'), l=seg.querySelector('[data-view="list"]');
             if(g) g.textContent=t("grid"); if(l) l.textContent=t("list"); }
    const lm=document.getElementById("loadingMsg"); if(lm) lm.textContent=t("loading");
  }
  function applyMeta(){
    document.title = t("docTitle");
    const setAttr=(id,val)=>{ const el=document.getElementById(id); if(el) el.setAttribute("content",val); };
    setAttr("metaDesc", t("metaDesc"));
    setAttr("ogTitle", t("ogTitle"));
    setAttr("ogDesc", t("metaDesc"));
    setAttr("twTitle", t("ogTitle"));
    setAttr("twDesc", t("metaDesc"));
    setAttr("ogLocale", OG_LOCALES[lang] || "en_GB");
  }
  function applyLang(code, rerender){
    if(!SUPPORTED.includes(code)) code="en";
    lang=code; T=I18N[code]; LOCALE=LOCALES[code]||"en-GB";
    try{ localStorage.setItem("ttlang", code); }catch(_){}
    buildFormats();
    applyStaticI18n();
    applyMeta();
    document.querySelectorAll("#langSwitch button").forEach(b=>b.classList.toggle("active", b.dataset.lang===code));
    if(rerender && DATA){ renderTabs(); setFooter(); render(false); }
  }

  function tzMinutes(d){
    let h=0,m=0;
    for(const x of new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:TZ}).formatToParts(d)){
      if(x.type==="hour") h=+x.value; if(x.type==="minute") m=+x.value;
    }
    return h*60+m;
  }
  // festival day key: sets before 06:00 belong to the previous calendar day
  function dayKeyOf(d){
    const mins = tzMinutes(d);
    const ref = mins < 6*60 ? new Date(d.getTime()-6*3600*1000) : d;
    return fmtDayKey.format(ref);
  }

  function prep(){
    TZ = DATA.timezone || TZ_DEFAULT;
    buildFormats();

    events = DATA.events.filter(e=>e.start && e.end).map(e=>{
      const sd=new Date(e.start), ed=new Date(e.end);
      const sm=tzMinutes(sd); let em=tzMinutes(ed);
      const o=Object.assign({},e);
      o._sd=sd; o._ed=ed; o._day=dayKeyOf(sd);
      o._startAbs = sm < 6*60 ? sm+1440 : sm;
      o._endAbs   = em <= sm ? em+1440 : (em<6*60 && sm>=6*60 ? em+1440 : em);
      return o;
    });
    dayMap = new Map();
    events.forEach(e=>{ if(!dayMap.has(e._day)) dayMap.set(e._day,[]); dayMap.get(e._day).push(e); });
    days = [...dayMap.keys()].sort();
  }

  // stage ordering from DATA.stages
  function stageOrderMap(){
    const m=new Map(); (DATA.stages||[]).forEach((s,i)=> m.set(s.id,(s.priority!=null?s.priority:9999)*100+i)); return m;
  }
  function stageColorMap(){
    const m=new Map(); (DATA.stages||[]).forEach(s=> m.set(s.id, s.color||null)); return m;
  }
  const SO = ()=>stageOrderMap(), SC = ()=>stageColorMap();

  function stagesForDay(list, order){
    const ids=[...new Set(list.map(e=>e.stageId))];
    ids.sort((a,b)=>(order.get(a)??9e9)-(order.get(b)??9e9));
    return ids;
  }

  function nowInfo(){
    const now=new Date();
    const dk=dayKeyOf(now);
    let abs=tzMinutes(now); if(abs<6*60) abs+=1440;
    return {now,dk,abs};
  }
  function isLive(e){ const n=Date.now(); return e._sd.getTime()<=n && e._ed.getTime()>n; }

  // ---- tabs ----
  const tabsEl=document.getElementById("dayTabs");
  function renderTabs(){
    const todayKey=nowInfo().dk;
    tabsEl.innerHTML="";
    days.forEach(dk=>{
      const b=document.createElement("button");
      b.className="tab"+(dk===curDay?" active":"")+(dk===todayKey?" today":"");
      b.innerHTML=fmtDayLbl.format(new Date(dk+"T12:00:00Z"))+'<span class="n">'+dayMap.get(dk).length+'</span>';
      b.onclick=()=>{ curDay=dk; renderTabs(); render(); };
      tabsEl.appendChild(b);
    });
  }

  function visible(list){
    if(!query) return list;
    const q=query.toLowerCase();
    return list.filter(e=>(e.title||"").toLowerCase().includes(q)||(e.artistName||"").toLowerCase().includes(q)||(e.stageName||"").toLowerCase().includes(q));
  }

  // ---- grid ----
  function renderGrid(list){
    const order=SO(), color=SC();
    const HOUR_H=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--hourH"))||64;
    const stages=stagesForDay(list,order);
    if(!stages.length) return '<div class="msg">'+esc(t("noMatch"))+'</div>';
    let minA=Math.min(...list.map(e=>e._startAbs)), maxA=Math.max(...list.map(e=>e._endAbs));
    minA=Math.floor(minA/60)*60; maxA=Math.ceil(maxA/60)*60;
    const hours=(maxA-minA)/60;
    const colTpl=`var(--axisW) repeat(${stages.length}, var(--colW))`;

    let head=`<div class="ghead" style="grid-template-columns:${colTpl}"><div class="corner scol"><span class="nm">${esc(t("timeCol"))}</span></div>`;
    stages.forEach(sid=>{
      const nm=list.find(e=>e.stageId===sid)?.stageName||("Stage "+sid);
      const col=color.get(sid)||"#3fb950";
      head+=`<div class="scol"><span class="dot" style="background:${esc(col)}"></span><span class="nm" title="${esc(nm)}">${esc(nm)}</span></div>`;
    });
    head+=`</div>`;

    let body=`<div class="gbody" style="grid-template-columns:${colTpl}"><div class="axis">`;
    for(let h=0;h<hours;h++){
      const hr=((minA/60)+h)%24;
      body+=`<div class="hour"><span class="lbl">${String(hr).padStart(2,"0")}:00</span></div>`;
    }
    body+=`</div>`;

    const ni=nowInfo();
    const showNow = curDay===ni.dk && ni.abs>=minA && ni.abs<=maxA;
    const nowLabel = "🏁 "+t("nowChip");
    stages.forEach(sid=>{
      body+=`<div class="lane" style="height:${hours*HOUR_H}px">`;
      for(let h=1;h<hours;h++) body+=`<div class="hline" style="top:${h*HOUR_H}px"></div>`;
      if(showNow){ const top=(ni.abs-minA)/60*HOUR_H; body+=`<div class="nowline" data-label="${esc(nowLabel)}" style="top:${top}px"></div>`; }
      list.filter(e=>e.stageId===sid).forEach(e=>{
        const top=(e._startAbs-minA)/60*HOUR_H, hgt=Math.max(22,(e._endAbs-e._startAbs)/60*HOUR_H-3);
        const col=e.stageColor||color.get(sid)||"#3fb950";
        const tm=(e.hideStart?"":fmtTime.format(e._sd))+(e.hideEnd||e.hideStart?"":"–"+fmtTime.format(e._ed));
        const so=e.soldOut?'<span class="badge">'+esc(t("soldOutBadge"))+'</span>':"";
        const cls="ev"+(hgt<34?" short":"")+(isLive(e)?" live":"");
        body+=`<div class="${cls}" style="top:${top}px;height:${hgt}px;border-left-color:${esc(col)}" data-id="${e.id}">`+
              `<div class="t">${esc(e.title)}${so}</div><div class="tm">${esc(tm)}</div></div>`;
      });
      body+=`</div>`;
    });
    body+=`</div>`;
    return `<div class="gridwrap" id="gridwrap"><div class="grid">${head}${body}</div></div>`;
  }

  // ---- list ----
  function renderList(list){
    const order=SO(), color=SC();
    const stages=stagesForDay(list,order);
    if(!stages.length) return '<div class="msg">'+esc(t("noMatch"))+'</div>';
    let html="";
    stages.forEach(sid=>{
      const evs=list.filter(e=>e.stageId===sid).sort((a,b)=>a._startAbs-b._startAbs);
      const nm=evs[0].stageName||("Stage "+sid), col=color.get(sid)||"#3fb950";
      html+=`<div class="stage-block"><h3><span class="dot" style="background:${esc(col)}"></span>${esc(nm)} <span class="pill">${evs.length}</span></h3>`;
      evs.forEach(e=>{
        const tm=(e.hideStart?"—":fmtTime.format(e._sd))+(e.hideEnd||e.hideStart?"":" – "+fmtTime.format(e._ed));
        const so=e.soldOut?'<span class="badge">'+esc(t("soldOutBadge"))+'</span>':"";
        const meta=e.artistName&&e.artistName!==e.title?`<div class="meta">${esc(e.artistName)}</div>`:"";
        html+=`<div class="li${isLive(e)?" live":""}" data-id="${e.id}"><div class="when">${esc(tm)}</div>`+
              `<div class="who">${esc(e.title)}${so}${meta}</div></div>`;
      });
      html+=`</div>`;
    });
    return html;
  }

  // ---- detail ----
  const modal=document.getElementById("modal"), card=document.getElementById("card");
  function openDetail(id){
    const e=events.find(x=>String(x.id)===String(id)); if(!e) return;
    const tm=fmtDayLbl.format(e._sd)+" · "+fmtTime.format(e._sd)+"–"+fmtTime.format(e._ed);
    card.innerHTML=`<span class="x" id="closeX">×</span><h2>${esc(e.title)}</h2>`+
      `<p class="sub">${esc(e.stageName)} · ${esc(tm)}${e.soldOut?' · <b style="color:var(--warn)">'+esc(t("soldOut"))+'</b>':''}${isLive(e)?' · <b style="color:var(--danger)">'+esc(t("onNow"))+'</b>':''}</p>`+
      (imgUrl(e.artistImage)?`<img src="${esc(imgUrl(e.artistImage))}" alt="${esc(e.artistName||e.title||"")}" loading="lazy" onerror="this.style.display='none'">`:"")+
      (e.bio?`<div class="bio">${e.bio}</div>`:'<div class="bio" style="color:var(--muted)">'+esc(t("noBio"))+'</div>');
    modal.classList.add("open");
    document.getElementById("closeX").onclick=()=>modal.classList.remove("open");
  }
  modal.onclick=ev=>{ if(ev.target===modal) modal.classList.remove("open"); };

  // ---- render + now-focus ----
  const main=document.getElementById("main");
  function render(focusNow){
    const list=visible(dayMap.get(curDay)||[]);
    main.innerHTML = view==="grid" ? renderGrid(list) : renderList(list);
    main.querySelectorAll("[data-id]").forEach(el=> el.onclick=()=>openDetail(el.getAttribute("data-id")));
    if(focusNow) scrollToNow();
  }
  function scrollToNow(){
    const ni=nowInfo();
    if(curDay!==ni.dk) return;
    if(view==="grid"){
      const wrap=document.getElementById("gridwrap"); const nl=wrap&&wrap.querySelector(".nowline");
      if(wrap&&nl){ wrap.scrollTop=Math.max(0, nl.offsetTop - wrap.clientHeight/2); }
    }else{
      const live=main.querySelector(".li.live")||[...main.querySelectorAll(".li")].find(el=>true);
      if(live) live.scrollIntoView({block:"center"});
    }
  }
  function goNow(){
    const ni=nowInfo();
    curDay = days.includes(ni.dk) ? ni.dk : nearestDay(ni.dk);
    renderTabs(); render(true);
  }
  function nearestDay(dk){
    if(days.includes(dk)) return dk;
    const after=days.find(d=>d>=dk); return after||days[days.length-1]||days[0];
  }

  document.getElementById("viewSeg").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    view=b.dataset.view; [...e.currentTarget.children].forEach(c=>c.classList.toggle("active",c===b));
    render(true);
  });
  document.getElementById("q").addEventListener("input",e=>{ query=e.target.value.trim(); render(false); });
  document.getElementById("nowBtn").addEventListener("click",goNow);

  function setFooter(){
    let fetched="";
    if(DATA.fetchedAt){ try{ fetched=" · "+t("fetched")+" "+new Date(DATA.fetchedAt).toLocaleString(LOCALE,{timeZone:TZ,dateStyle:"medium",timeStyle:"short"})+" CEST"; }catch(_){ } }
    document.getElementById("footer").innerHTML=
      `${events.length} ${esc(t("performances"))} · ${days.length} ${esc(t("days"))} · ${(DATA.stages||[]).length} ${esc(t("stages"))}. `+
      `${esc(t("source"))}: <span class="pill">${esc(DATA.source||"Appmiral API")}</span>${esc(fetched)}.`;
  }

  function boot(data){
    DATA=data; prep();
    if(!days.length){ main.innerHTML='<div class="msg">'+esc(t("noData"))+'</div>'; return; }
    view = isMobile() ? "list" : "grid";
    syncViewSeg();
    const ni=nowInfo();
    curDay = days.includes(ni.dk) ? ni.dk : nearestDay(ni.dk);
    renderTabs(); setFooter(); render(true);
  }

  applyLang(detectLang(), false);
  document.getElementById("langSwitch").addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b) return;
    applyLang(b.dataset.lang, true);
  });
  let _rz; window.addEventListener("resize", ()=>{ clearTimeout(_rz); _rz=setTimeout(()=>{ if(DATA) render(false); }, 150); });

  fetch("timetable.json?_="+Date.now())
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(boot)
    .catch(err=>{ main.innerHTML='<div class="msg">'+esc(t("loadError"))+esc(err.message)+'</div>'; });
})();
</script>
</body>
</html>
